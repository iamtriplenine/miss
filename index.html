<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Miss Beauté — Excellence & Élégance</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
/* ===== VARIABLES & THÈME NOIR/OR ===== */
:root {
    --gold:    #c9a84c;
    --gold2:   #e8c97a;
    --rose:    #f2c4ce;
    --deep:    #0a0a0a; /* Noir pur */
    --surface: rgba(30, 30, 30, 0.6);
    --glass:   rgba(255, 255, 255, 0.05);
    --border:  rgba(201, 168, 76, 0.25);
    --text:    #ffffff;
    --muted:   rgba(255, 255, 255, 0.6);
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

body {
    font-family: 'DM Sans', sans-serif;
    background: var(--deep);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
    background-image: radial-gradient(circle at 50% -20%, #2a1b10 0%, #0a0a0a 100%);
}

/* Effet grain de luxe */
body::after {
    content: "";
    position: fixed; inset: 0;
    background-image: url("https://www.transparenttextures.com/patterns/stardust.png");
    opacity: 0.1; pointer-events: none; z-index: 1;
}

/* ===== ICONS SVG ===== */
.icon-svg { width: 1.2em; height: 1.2em; fill: currentColor; vertical-align: middle; }

/* ===== HERO ===== */
.hero {
    position: relative; z-index: 2;
    text-align: center;
    padding: 80px 20px 40px;
}

.crown-svg { width: 50px; height: 50px; fill: var(--gold); margin-bottom: 20px; filter: drop-shadow(0 0 10px rgba(201,168,76,0.5)); }

.hero-label {
    letter-spacing: 0.4em;
    text-transform: uppercase;
    font-size: 10px;
    font-weight: 700;
    color: var(--gold);
    margin-bottom: 12px;
}

.hero h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(40px, 10vw, 85px);
    font-weight: 300;
    line-height: 0.9;
    letter-spacing: -0.02em;
}

.hero h1 em { font-style: italic; color: var(--gold2); font-weight: 400; }

.gold-line {
    width: 80px; height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    margin: 30px auto;
}

/* ===== DESIGN LIQUIDE GLACE (GLASSMORPHISM) ===== */
.glass-btn {
    background: var(--glass);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid var(--border);
    transition: all 0.3s ease;
}

.vote-info {
    display: inline-flex; gap: 20px;
    padding: 15px 30px;
    border-radius: 100px;
    font-size: 13px;
    color: var(--muted);
    flex-wrap: wrap; justify-content: center;
}
.vote-info b { color: var(--gold2); }

/* ===== SEARCH ===== */
.controls { position: relative; z-index: 2; max-width: 500px; margin: 0 auto 50px; padding: 0 20px; }
.search-wrap input {
    width: 100%;
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border);
    border-radius: 100px;
    padding: 15px 25px;
    color: white;
    outline: none;
}
.search-wrap .icon { position: absolute; right: 25px; top: 50%; transform: translateY(-50%); color: var(--gold); }

/* ===== GRID & CARDS ===== */
.grid-section { position: relative; z-index: 2; max-width: 1300px; margin: 0 auto; padding: 0 20px 100px; }
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }

.card {
    background: rgba(255,255,255,0.02);
    border: 1px solid var(--border);
    border-radius: 20px;
    overflow: hidden;
    backdrop-filter: blur(5px);
    transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}
.card:hover { transform: translateY(-10px); border-color: var(--gold); }

.card-img { position: relative; aspect-ratio: 4/5; cursor: zoom-in; overflow: hidden; }
.card-img img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.6s ease; }
.card:hover .card-img img { transform: scale(1.1); }

.card-numero {
    position: absolute; top: 15px; left: 15px;
    background: rgba(0,0,0,0.7);
    border: 1px solid var(--gold);
    padding: 5px 15px; border-radius: 100px;
    font-family: 'Cormorant Garamond', serif;
    font-weight: bold; color: var(--gold);
}

.card-body { padding: 20px; }
.card-name { font-family: 'Cormorant Garamond', serif; font-size: 24px; margin-bottom: 5px; color: var(--gold2); }
.card-desc { font-size: 12px; color: var(--muted); margin-bottom: 20px; }

.card-footer { display: flex; align-items: center; justify-content: space-between; }

/* BOUTON VOTE DESIGN GLACE */
.btn-vote {
    background: rgba(201, 168, 76, 0.15);
    border: 1px solid var(--gold);
    color: var(--gold2);
    padding: 10px 20px; border-radius: 100px;
    cursor: pointer; font-weight: 600; font-size: 13px;
    display: flex; align-items: center; gap: 8px;
    backdrop-filter: blur(5px);
}
.btn-vote:hover { background: var(--gold); color: black; }

/* ===== LIGHTBOX (ZOOM PHOTO) ===== */
#lightbox {
    position: fixed; inset: 0; z-index: 2000;
    background: rgba(0,0,0,0.95);
    display: none; align-items: center; justify-content: center;
    backdrop-filter: blur(15px);
    opacity: 0; transition: opacity 0.3s ease;
}
#lightbox.active { display: flex; opacity: 1; }
#lightbox img { max-width: 90%; max-height: 85vh; border: 2px solid var(--gold); border-radius: 10px; box-shadow: 0 0 50px rgba(201,168,76,0.3); }
.close-lightbox {
    position: absolute; top: 30px; right: 30px;
    background: var(--gold); border: none; width: 45px; height: 45px;
    border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center;
    color: black; font-size: 24px; transition: transform 0.2s;
}
.close-lightbox:hover { transform: rotate(90deg) scale(1.1); }

/* ===== MODALS & INPUTS ===== */
.overlay {
    position: fixed; inset: 0; z-index: 1000;
    background: rgba(0,0,0,0.8); backdrop-filter: blur(10px);
    display: none; align-items: center; justify-content: center; padding: 20px;
}
.overlay.active { display: flex; }
.modal {
    background: #151515; border: 1px solid var(--border);
    padding: 40px; border-radius: 30px; width: 100%; max-width: 450px;
}
.field {
    width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--border);
    padding: 15px; border-radius: 15px; color: white; margin-bottom: 15px;
}
.btn-main {
    width: 100%; background: linear-gradient(135deg, var(--gold), #8a6d2b);
    border: none; padding: 18px; border-radius: 100px;
    font-weight: bold; color: black; cursor: pointer; text-transform: uppercase; letter-spacing: 1px;
}

/* ===== SÉCURITÉ TRANSACTION ===== */
.field-txn-wrap { position: relative; margin-bottom: 6px; }
.field-txn-wrap .field { margin-bottom: 0; padding-right: 46px; transition: border-color 0.25s, box-shadow 0.25s; }
.field-txn-wrap .field.valid   { border-color: #34d399 !important; box-shadow: 0 0 0 3px rgba(52,211,153,0.12); }
.field-txn-wrap .field.invalid { border-color: #f87171 !important; box-shadow: 0 0 0 3px rgba(248,113,113,0.12); }
.field-txn-icon {
    position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
    display: none; width: 20px; height: 20px;
}
.field-txn-icon.show { display: block; }
.txn-feedback {
    font-size: 11px; font-weight: 500; line-height: 1.5;
    padding: 8px 12px; border-radius: 10px; margin-top: 7px; margin-bottom: 14px;
    display: none;
}
.txn-feedback.show { display: block; }
.txn-feedback.err  { background: rgba(248,113,113,0.1); border: 1px solid rgba(248,113,113,0.3); color: #fca5a5; }
.txn-feedback.ok   { background: rgba(52,211,153,0.08); border: 1px solid rgba(52,211,153,0.25); color: #6ee7b7; }
.txn-feedback.warn { background: rgba(251,191,36,0.08); border: 1px solid rgba(251,191,36,0.3); color: #fcd34d; }

@keyframes shake {
    0%,100% { transform: translateX(0); }
    20%,60%  { transform: translateX(-5px); }
    40%,80%  { transform: translateX(5px); }
}
.shake { animation: shake 0.4s ease; }

/* ===== BOUTON FLOTTANT WHATSAPP ===== */
.wa-float {
    position: fixed;
    bottom: 28px;
    left: 28px; /* à gauche pour ne pas gêner les toasts à droite */
    z-index: 4000;
    display: flex;
    align-items: center;
    gap: 0;
    cursor: pointer;
    text-decoration: none;
}

.wa-bubble {
    width: 52px; height: 52px;
    border-radius: 50%;
    background: linear-gradient(135deg, rgba(37,211,102,0.18) 0%, rgba(18,140,64,0.12) 100%);
    border: 1px solid rgba(37,211,102,0.45);
    backdrop-filter: blur(16px) saturate(1.6);
    -webkit-backdrop-filter: blur(16px) saturate(1.6);
    display: flex; align-items: center; justify-content: center;
    color: #4ade80;
    box-shadow: 0 4px 24px rgba(37,211,102,0.2), inset 0 1px 0 rgba(255,255,255,0.1);
    transition: all 0.28s cubic-bezier(.2,.8,.3,1);
    position: relative;
    flex-shrink: 0;
}
.wa-bubble::before {
    content: '';
    position: absolute; inset: 0; border-radius: 50%;
    background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, transparent 55%);
}

/* Pastille "aide" animée */
.wa-dot {
    position: absolute; top: 3px; right: 3px;
    width: 11px; height: 11px; border-radius: 50%;
    background: #34d399;
    border: 2px solid #0a0a0a;
    animation: waPulse 2.2s ease-in-out infinite;
}
@keyframes waPulse {
    0%,100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(52,211,153,0.5); }
    50%      { transform: scale(1.15); box-shadow: 0 0 0 6px rgba(52,211,153,0); }
}

/* Étiquette texte qui apparaît au hover */
.wa-label {
    max-width: 0;
    overflow: hidden;
    white-space: nowrap;
    background: linear-gradient(135deg, rgba(18,18,18,0.95) 0%, rgba(10,10,10,0.9) 100%);
    border: 1px solid rgba(37,211,102,0.3);
    border-left: none;
    border-radius: 0 50px 50px 0;
    padding: 0;
    font-size: 12px; font-weight: 600;
    color: #4ade80;
    transition: max-width 0.35s cubic-bezier(.2,.8,.3,1), padding 0.35s;
    backdrop-filter: blur(12px);
    margin-left: -10px;
    padding-left: 0;
    line-height: 52px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.3);
}

.wa-float:hover .wa-label {
    max-width: 200px;
    padding: 0 18px 0 18px;
}
.wa-float:hover .wa-bubble {
    background: linear-gradient(135deg, rgba(37,211,102,0.28) 0%, rgba(18,140,64,0.2) 100%);
    border-color: rgba(37,211,102,0.7);
    box-shadow: 0 8px 32px rgba(37,211,102,0.35), inset 0 1px 0 rgba(255,255,255,0.15);
    transform: scale(1.06);
}

@media (max-width: 600px) {
    .wa-float { bottom: 20px; left: 16px; }
    .wa-bubble { width: 46px; height: 46px; }
}

/* ===== FIN WHATSAPP ===== */
@media (max-width: 600px) {
    .grid { 
        grid-template-columns: repeat(2, 1fr); /* Force 2 colonnes */
        gap: 12px; /* Réduit l'espace entre les cartes pour gagner de la place */
    }
    .hero h1 { font-size: 42px; } /* Ajuste le titre pour mobile */
    .card-body { padding: 12px; } /* Réduit les marges internes des cartes */
    .card-name { font-size: 18px; } /* Rend le nom plus petit pour éviter les retours à la ligne */
    .btn-vote { padding: 8px 12px; font-size: 11px; } /* Ajuste le bouton */
}


 /* Désactiver l'affichage des boutons de vote */
.btn-vote {
    display: none !important;
} 

/* Optionnel : masquer aussi les infos de prix en haut */
.vote-info {
    display: none !important;
} 

    </style>

<script>
// ==========================================
// CONFIG & STATE
// ==========================================
const API       = "https://backend-xxgf.onrender.com";
const WAVE_LINK = "https://pay.wave.com/m/M_ci_zuXWh0fj9YGV/c/ci/";

let allCandidates = [];
let currentVoter  = null;
let targetCand    = null;

// ==========================================
// SÉCURITÉ — VALIDATION DES IDs DE TRANSACTION
// ==========================================

// Format attendu : une lettre, un underscore, puis 10+ caractères alphanumériques
// Avec tolérance d'un tiret optionnel entre le 4e et 6e caractère après l'underscore
// Exemples valides :
//   T_R5553BC34EDGXUZF        (sans tiret)
//   T_URZJC-BEKF2RXRY4H      (avec tiret entre pos 4-6)
//   T_URZ JC-BEKF2RXRY4H     (espaces tolérés, nettoyés automatiquement)
const TXN_REGEX = /^[A-Za-z]_[A-Za-z0-9]{3,6}-?[A-Za-z0-9]{6,}$/;

// Clé localStorage pour stocker les IDs déjà utilisés
const USED_TXN_KEY = 'miss_used_txn_ids';

function getUsedTxnIds() {
    try { return JSON.parse(localStorage.getItem(USED_TXN_KEY) || '[]'); }
    catch { return []; }
}

function saveUsedTxnId(id) {
    const ids = getUsedTxnIds();
    if (!ids.includes(id)) {
        ids.push(id);
        // Garder max 200 entrées pour ne pas surcharger le localStorage
        if (ids.length > 200) ids.splice(0, ids.length - 200);
        localStorage.setItem(USED_TXN_KEY, JSON.stringify(ids));
    }
}

/**
 * Comptage de caractères en même position (similarité positionnelle)
 * Ex: "T_R5553BC34EDGXUZF" vs "T_R5553BC34EDGXUZA" → 17 correspondances
 */
function countPositionalMatches(a, b) {
    const len = Math.min(a.length, b.length);
    let matches = 0;
    for (let i = 0; i < len; i++) {
        if (a[i] === b[i]) matches++;
    }
    return matches;
}

const SIMILARITY_THRESHOLD = 10; // ≥10 caractères en même position = suspicion

/**
 * Vérifie un ID de transaction.
 * Retourne { valid: bool, code: string, message: string }
 */
function validerTxnId(txnId) {
    // Nettoyer les espaces (tolérés à la saisie, retirés avant validation)
    const raw = txnId.replace(/\s/g, '').trim();

    // 1. Champ vide
    if (!raw) {
        return { valid: false, code: 'empty', message: 'Veuillez coller votre référence de paiement Wave.' };
    }

    // 2. Format invalide
    if (!TXN_REGEX.test(raw)) {
        return {
            valid: false,
            code: 'format',
            message: `Format invalide. Une référence Wave ressemble à : T_R5553BC34EDGXUZF\n(une lettre, un tiret bas, puis au moins 10 caractères alphanumériques).`
        };
    }

    // 3. ID déjà utilisé exactement
    const usedIds = getUsedTxnIds();
    if (usedIds.includes(raw)) {
        return {
            valid: false,
            code: 'duplicate',
            message: `Cette référence a déjà été soumise. Chaque transaction Wave est unique et ne peut être utilisée qu'une seule fois.`
        };
    }

    // 4. Trop similaire à un ID déjà utilisé (fraude par variation)
    for (const used of usedIds) {
        const matches = countPositionalMatches(raw.toUpperCase(), used.toUpperCase());
        if (matches >= SIMILARITY_THRESHOLD) {
            return {
                valid: false,
                code: 'similar',
                message: `Cette référence ressemble fortement à une transaction déjà utilisée (${matches} caractères identiques). Veuillez utiliser une vraie référence Wave.`
            };
        }
    }

    return { valid: true, code: 'ok', message: 'Référence valide.' };
}

// ==========================================
// VALIDATION EN TEMPS RÉEL SUR LE CHAMP
// ==========================================
function attachTxnValidation(inputId, feedbackId) {
    const input = document.getElementById(inputId);
    const feedback = document.getElementById(feedbackId);
    if (!input || !feedback) return;

    // Icône SVG check vert
    const iconOk = `<svg viewBox="0 0 24 24" fill="none" stroke="#34d399" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>`;
    // Icône SVG croix rouge
    const iconErr = `<svg viewBox="0 0 24 24" fill="none" stroke="#f87171" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>`;

    let iconEl = input.parentNode.querySelector('.field-txn-icon');
    if (!iconEl) {
        iconEl = document.createElement('span');
        iconEl.className = 'field-txn-icon';
        input.parentNode.appendChild(iconEl);
    }

    input.addEventListener('input', () => {
        const val = input.value.trim();
        if (!val) {
            input.classList.remove('valid', 'invalid');
            feedback.className = 'txn-feedback';
            iconEl.className = 'field-txn-icon';
            return;
        }

        const result = validerTxnId(val);
        if (result.valid) {
            input.classList.add('valid'); input.classList.remove('invalid');
            feedback.className = 'txn-feedback ok show';
            feedback.textContent = '✓ Référence valide';
            iconEl.innerHTML = iconOk; iconEl.className = 'field-txn-icon show';
        } else {
            input.classList.add('invalid'); input.classList.remove('valid');
            feedback.className = `txn-feedback ${result.code === 'format' ? 'warn' : 'err'} show`;
            feedback.textContent = result.message;
            iconEl.innerHTML = iconErr; iconEl.className = 'field-txn-icon show';
        }
    });

    // Envelopper le champ s'il n'est pas déjà enveloppé
    if (!input.parentNode.classList.contains('field-txn-wrap')) {
        const wrap = document.createElement('div');
        wrap.className = 'field-txn-wrap';
        input.parentNode.insertBefore(wrap, input);
        wrap.appendChild(input);
        wrap.appendChild(iconEl);
    }
}

// ==========================================

function renderGrid(list) {
    const sorted = [...list].sort((a, b) => b.votes - a.votes);
    document.getElementById('grid-count').textContent = `${sorted.length} CANDIDATES `;

    document.getElementById('grid').innerHTML = sorted.map((c, i) => `
        <div class="card" style="animation: fadeUp 0.6s ease forwards ${i * 0.1}s; opacity:0;">
            <div class="card-img" onclick="openLightbox('${c.photo_url || ''}')">
                ${c.photo_url
                    ? `<img src="${c.photo_url}" alt="${c.nom}">`
                    : `<div style="height:100%; display:flex; align-items:center; justify-content:center; background:#1a1a1a;"><svg style="width:50px; fill:#333;"><use xlink:href="#icon-crown"></use></svg></div>`
                }
                <span class="card-numero">N° ${String(c.numero).padStart(2,'0')}</span>
            </div>
            <div class="card-body">
                <div class="card-name">${c.nom}</div>
                <div class="card-desc">${c.description || 'Candidate Officielle'}</div>
                <div class="card-footer">
                    <div style="font-size:14px; color:var(--rose); font-weight:bold; display:flex; align-items:center; gap:5px;">
                        <svg class="icon-svg"><use xlink:href="#icon-heart"></use></svg>

                    </div>
                    <button class="btn-vote" onclick="ouvrirVote(${c.id})">VOTER</button>
                </div>

async function submitLogin() {
    const tel   = document.getElementById('login-tel').value;
    const email = document.getElementById('login-email').value;
    if (!tel && !email) return toast("Veuillez remplir un champ", false);

// ==========================================
// SOUMISSION SÉCURISÉE
// ==========================================
async function soumettreDemande(nb, mont) {
    const inputEl   = document.getElementById('txn-id-premier') || document.getElementById('txn-id-multi');
    const feedbackEl = document.getElementById('txn-feedback-premier') || document.getElementById('txn-feedback-multi');
    const tid = (inputEl ? inputEl.value : '').replace(/\s/g, '').trim();

    // Validation complète avant envoi
    const check = validerTxnId(tid);
    if (!check.valid) {
        if (inputEl) {
            inputEl.classList.add('invalid', 'shake');
            setTimeout(() => inputEl.classList.remove('shake'), 450);
        }
        if (feedbackEl) {
            feedbackEl.className = `txn-feedback ${check.code === 'format' ? 'warn' : 'err'} show`;
            feedbackEl.textContent = check.message;
        }
        toast(check.code === 'duplicate' ? '⛔ Référence déjà utilisée' : check.code === 'similar' ? '⚠️ Référence suspecte' : '❌ Référence invalide', false);
        return;
    }

    try {
        const r = await fetch(`${API}/miss/voter/demande-vote`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                voter_id:          currentVoter.id,
                candidate_numero:  targetCand.numero,
                nombre_votes:      nb,
                montant:           mont,
                transaction_id:    tid
            })
        });
        const data = await r.json();
        if (data.success) {
            // Enregistrer l'ID localement pour bloquer les réutilisations
            saveUsedTxnId(tid);

            document.getElementById('modal-vote-content').innerHTML = `
                <div style="text-align:center; padding:20px;">
                    <svg class="icon-svg" style="width:60px; height:60px; color:var(--gold); margin-bottom:20px;"><use xlink:href="#icon-crown"></use></svg>
                    <h3 style="color:var(--gold2); font-family:'Cormorant Garamond'; font-size:24px;">Demande Reçue</h3>
                    <p style="font-size:14px; color:var(--muted); margin:15px 0;">Votre vote est en cours de validation par nos services.</p>
                    <button class="btn-main" onclick="closeModal('modal-vote')">Fermer</button>
                </div>
            `;
            currentVoter.a_paye_premier_vote = true;
            localStorage.setItem('miss_voter', JSON.stringify(currentVoter));
        } else {
            toast(data.message || "Erreur lors de l'envoi.", false);
        }
    } catch(e) { toast("Erreur réseau", false); }
}

function soumettreDemandeMulti() {
    const qty = Math.max(1, parseInt(document.getElementById('qty-votes').value) || 1);
    soumettreDemande(qty, qty * 25);
}

// ==========================================
function filtrer() {

    renderGrid(allCandidates.filter(c => c.nom.toLowerCase().includes(q) || String(c.numero).includes(q)));

// ==========================================
// MODALS & TOAST
// ==========================================
function openModal(id)  { document.getElementById(id).classList.add('active'); }
function closeModal(id) { document.getElementById(id).classList.remove('active'); }

function toast(msg, ok = true) {
    const t = document.createElement('div');
    t.style.cssText = `background:${ok ? '#1a4a1a' : '#4a1a1a'}; color:white; padding:15px 25px; border-radius:10px; margin-top:10px; border:1px solid ${ok ? '#2a6a2a' : '#6a2a2a'}; font-size:13px;`;
    t.textContent = msg;
    document.getElementById('toasts').appendChild(t);
    setTimeout(() => t.remove(), 5000);
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });

    numero:      3,                     // Numéro de la manche en cours
    label:       "Manche en cours"      // Texte affiché avant le numéro
};

// ===================================================
// CONFIG COMPTE À REBOURS
// Mettez la date/heure de fin de la manche (format ISO) :
// ===================================================
const COUNTDOWN_CONFIG = {
    dateFinISO: "2026-04-24T00:00:00",  // ← Changez cette date !
    messageApres: "La manche est terminée !"
};

// ==========================================
// BANNIÈRE PUB — LOGIQUE
// ==========================================
(function initPub() {
    const overlay  = document.getElementById('pub-overlay');
    const imgEl    = document.getElementById('pub-img');
    const linkEl   = document.getElementById('pub-img-link');
    const secEl    = document.getElementById('pub-countdown-sec');
    const closeBtn = document.getElementById('pub-close-btn');
    const nameEl   = document.getElementById('pub-sponsor-name');

    // Appliquer config
    imgEl.src = PUB_CONFIG.imageUrl;
    linkEl.href = PUB_CONFIG.lienUrl;
    nameEl.textContent = PUB_CONFIG.sponsorName || '';

    

    const tick = setInterval(() => {
        restant--;
        if (secEl) secEl.textContent = restant;
        if (restant <= 0) {
            clearInterval(tick);
            closeBtn.style.pointerEvents = '';
            closeBtn.style.opacity = '';
            document.getElementById('pub-timer-badge').style.opacity = '0';
        }
    }, 1000);

    // Clic sur le fond (hors carte) → ferme aussi
    overlay.addEventListener('click', (e) => {
        if (e.target === overlay || e.target === document.getElementById('pub-bg')) {
            if (restant <= 0) fermerPub();
        }
    });
})();

function fermerPub() {
    const overlay = document.getElementById('pub-overlay');
    overlay.style.transition = 'opacity 0.4s ease';
    overlay.style.opacity = '0';
    setTimeout(() => overlay.remove(), 420);
}

// ==========================================
// MANCHE ACTUELLE — INJECT
// ==========================================
(function initManche() {
    // Insérer le badge manche dans le hero, après .gold-line
    const goldLine = document.querySelector('.gold-line');
    if (!goldLine) return;

    const badge = document.createElement('div');
    badge.id = 'manche-badge';
    badge.innerHTML = `
        <span class="manche-dot"></span>
        <span>${MANCHE_CONFIG.label} : <strong>MANCHE ${MANCHE_CONFIG.numero}</strong></span>
    `;

    goldLine.insertAdjacentElement('afterend', badge);
})();

// ==========================================
// COMPTE À REBOURS — INJECT & TICK
// ==========================================
(function initCountdown() {
    const goldLine = document.querySelector('.gold-line');
    if (!goldLine) return;

    // Créer le bloc countdown
    const wrap = document.createElement('div');
    wrap.id = 'countdown-wrap';
    wrap.innerHTML = `
        <div class="cd-block"><div class="cd-num" id="cd-j">--</div><div class="cd-label">Jours</div></div>
        <span class="cd-sep">:</span>
        <div class="cd-block"><div class="cd-num" id="cd-h">--</div><div class="cd-label">Heures</div></div>
        <span class="cd-sep">:</span>
        <div class="cd-block"><div class="cd-num" id="cd-m">--</div><div class="cd-label">Minutes</div></div>
        <span class="cd-sep">:</span>
        <div class="cd-block"><div class="cd-num" id="cd-s">--</div><div class="cd-label">Secondes</div></div>
    `;

    // Insérer après le badge manche (ou après gold-line si pas de manche)
    const mancheBadge = document.getElementById('manche-badge');
    const insertAfter = mancheBadge || goldLine;
    insertAfter.insertAdjacentElement('afterend', wrap);

    const finDate = new Date(COUNTDOWN_CONFIG.dateFinISO);

    function pad(n) { return String(n).padStart(2, '0'); }

    function tickCountdown() {
        const now  = new Date();
        const diff = finDate - now;

        if (diff <= 0) {
            ['cd-j','cd-h','cd-m','cd-s'].forEach(id => {
                const el = document.getElementById(id);
                if (el) el.textContent = '00';
            });
            wrap.insertAdjacentHTML('afterend',
                `<p style="text-align:center; color:var(--gold); font-size:13px; letter-spacing:0.1em; margin-bottom:16px;">${COUNTDOWN_CONFIG.messageApres}</p>`
            );
            clearInterval(cdInterval);
            return;
        }

        const jours   = Math.floor(diff / 86400000);
        const heures  = Math.floor((diff % 86400000) / 3600000);
        const minutes = Math.floor((diff % 3600000)  / 60000);
        const secondes= Math.floor((diff % 60000)    / 1000);

        document.getElementById('cd-j').textContent = pad(jours);
        document.getElementById('cd-h').textContent = pad(heures);
        document.getElementById('cd-m').textContent = pad(minutes);
        document.getElementById('cd-s').textContent = pad(secondes);
    }

    tickCountdown();
    const cdInterval = setInterval(tickCountdown, 1000);
})();
</script>

</body>
</html>
