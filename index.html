<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Miss Beauté — Excellence & Élégance</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
/* ===== VARIABLES & THÈME NOIR/OR ===== */
:root {
    --gold:    #c9a84c;
    --gold2:   #e8c97a;
    --rose:    #f2c4ce;
    --deep:    #0a0a0a; /* Noir pur */
    --surface: rgba(30, 30, 30, 0.6);
    --glass:   rgba(255, 255, 255, 0.05);
    --border:  rgba(201, 168, 76, 0.25);
    --text:    #ffffff;
    --muted:   rgba(255, 255, 255, 0.6);
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

body {
    font-family: 'DM Sans', sans-serif;
    background: var(--deep);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
    background-image: radial-gradient(circle at 50% -20%, #2a1b10 0%, #0a0a0a 100%);
}

/* Effet grain de luxe */
body::after {
    content: "";
    position: fixed; inset: 0;
    background-image: url("https://www.transparenttextures.com/patterns/stardust.png");
    opacity: 0.1; pointer-events: none; z-index: 1;
}

/* ===== ICONS SVG ===== */
.icon-svg { width: 1.2em; height: 1.2em; fill: currentColor; vertical-align: middle; }

/* ===== HERO ===== */
.hero {
    position: relative; z-index: 2;
    text-align: center;
    padding: 80px 20px 40px;
}

.crown-svg { width: 50px; height: 50px; fill: var(--gold); margin-bottom: 20px; filter: drop-shadow(0 0 10px rgba(201,168,76,0.5)); }

.hero-label {
    letter-spacing: 0.4em;
    text-transform: uppercase;
    font-size: 10px;
    font-weight: 700;
    color: var(--gold);
    margin-bottom: 12px;
}

.hero h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(40px, 10vw, 85px);
    font-weight: 300;
    line-height: 0.9;
    letter-spacing: -0.02em;
}

.hero h1 em { font-style: italic; color: var(--gold2); font-weight: 400; }

.gold-line {
    width: 80px; height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    margin: 30px auto;
}

/* ===== DESIGN LIQUIDE GLACE (GLASSMORPHISM) ===== */
.glass-btn {
    background: var(--glass);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid var(--border);
    transition: all 0.3s ease;
}

.vote-info {
    display: inline-flex; gap: 20px;
    padding: 15px 30px;
    border-radius: 100px;
    font-size: 13px;
    color: var(--muted);
    flex-wrap: wrap; justify-content: center;
}
.vote-info b { color: var(--gold2); }

/* ===== SEARCH ===== */
.controls { position: relative; z-index: 2; max-width: 500px; margin: 0 auto 50px; padding: 0 20px; }
.search-wrap input {
    width: 100%;
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border);
    border-radius: 100px;
    padding: 15px 25px;
    color: white;
    outline: none;
}
.search-wrap .icon { position: absolute; right: 25px; top: 50%; transform: translateY(-50%); color: var(--gold); }

/* ===== GRID & CARDS ===== */
.grid-section { position: relative; z-index: 2; max-width: 1300px; margin: 0 auto; padding: 0 20px 100px; }
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }

.card {
    background: rgba(255,255,255,0.02);
    border: 1px solid var(--border);
    border-radius: 20px;
    overflow: hidden;
    backdrop-filter: blur(5px);
    transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}
.card:hover { transform: translateY(-10px); border-color: var(--gold); }

.card-img { position: relative; aspect-ratio: 4/5; cursor: zoom-in; overflow: hidden; }
.card-img img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.6s ease; }
.card:hover .card-img img { transform: scale(1.1); }

.card-numero {
    position: absolute; top: 15px; left: 15px;
    background: rgba(0,0,0,0.7);
    border: 1px solid var(--gold);
    padding: 5px 15px; border-radius: 100px;
    font-family: 'Cormorant Garamond', serif;
    font-weight: bold; color: var(--gold);
}

.card-body { padding: 20px; }
.card-name { font-family: 'Cormorant Garamond', serif; font-size: 24px; margin-bottom: 5px; color: var(--gold2); }
.card-desc { font-size: 12px; color: var(--muted); margin-bottom: 20px; }

.card-footer { display: flex; align-items: center; justify-content: space-between; }

/* BOUTON VOTE DESIGN GLACE */
.btn-vote {
    background: rgba(201, 168, 76, 0.15);
    border: 1px solid var(--gold);
    color: var(--gold2);
    padding: 10px 20px; border-radius: 100px;
    cursor: pointer; font-weight: 600; font-size: 13px;
    display: flex; align-items: center; gap: 8px;
    backdrop-filter: blur(5px);
}
.btn-vote:hover { background: var(--gold); color: black; }

/* ===== LIGHTBOX (ZOOM PHOTO) ===== */
#lightbox {
    position: fixed; inset: 0; z-index: 2000;
    background: rgba(0,0,0,0.95);
    display: none; align-items: center; justify-content: center;
    backdrop-filter: blur(15px);
    opacity: 0; transition: opacity 0.3s ease;
}
#lightbox.active { display: flex; opacity: 1; }
#lightbox img { max-width: 90%; max-height: 85vh; border: 2px solid var(--gold); border-radius: 10px; box-shadow: 0 0 50px rgba(201,168,76,0.3); }
.close-lightbox {
    position: absolute; top: 30px; right: 30px;
    background: var(--gold); border: none; width: 45px; height: 45px;
    border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center;
    color: black; font-size: 24px; transition: transform 0.2s;
}
.close-lightbox:hover { transform: rotate(90deg) scale(1.1); }

/* ===== MODALS & INPUTS ===== */
.overlay {
    position: fixed; inset: 0; z-index: 1000;
    background: rgba(0,0,0,0.8); backdrop-filter: blur(10px);
    display: none; align-items: center; justify-content: center; padding: 20px;
}
.overlay.active { display: flex; }
.modal {
    background: #151515; border: 1px solid var(--border);
    padding: 40px; border-radius: 30px; width: 100%; max-width: 450px;
}
.field {
    width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--border);
    padding: 15px; border-radius: 15px; color: white; margin-bottom: 15px;
}
.btn-main {
    width: 100%; background: linear-gradient(135deg, var(--gold), #8a6d2b);
    border: none; padding: 18px; border-radius: 100px;
    font-weight: bold; color: black; cursor: pointer; text-transform: uppercase; letter-spacing: 1px;
}

@media (max-width: 600px) {
    .grid { grid-template-columns: 1fr; }
    .hero h1 { font-size: 50px; }
}
    </style>
</head>
<body>

<svg style="display: none;">
    <symbol id="icon-crown" viewBox="0 0 24 24">
        <path d="M5 16L3 5L8.5 10L12 4L15.5 10L21 5L19 16H5M19 19C19 19.6 18.6 20 18 20H6C5.4 20 5 19.6 5 19V18H19V19Z"/>
    </symbol>
    <symbol id="icon-heart" viewBox="0 0 24 24">
        <path d="M12,21.35L10.55,20.03C5.4,15.36 2,12.27 2,8.5C2,5.41 4.41,3 7.5,3C9.24,3 10.91,3.81 12,5.08C13.09,3.81 14.76,3 16.5,3C19.59,3 22,5.41 22,8.5C22,12.27 18.6,15.36 13.45,20.03L12,21.35Z"/>
    </symbol>
    <symbol id="icon-search" viewBox="0 0 24 24">
        <path d="M9.5,3A6.5,6.5 0 0,1 16,9.5C16,11.11 15.41,12.59 14.44,13.73L14.71,14H15.5L20.5,19L19,20.5L14,15.5V14.71L13.73,14.44C12.59,15.41 11.11,16 9.5,16A6.5,6.5 0 0,1 3,9.5A6.5,6.5 0 0,1 9.5,3M9.5,5C7,5 5,7 5,9.5C5,12 7,14 9.5,14C12,14 14,12 14,9.5C14,7 12,5 9.5,5Z"/>
    </symbol>
    <symbol id="icon-close" viewBox="0 0 24 24">
        <path d="M19,6.41L17.59,5L12,10.59L6.41,5L5,6.41L10.59,12L5,17.59L6.41,19L12,13.41L17.59,19L19,17.59L13.41,12L19,6.41Z"/>
    </symbol>
</svg>

<div id="lightbox">
    <button class="close-lightbox" onclick="closeLightbox()">
        <svg class="icon-svg"><use xlink:href="#icon-close"></use></svg>
    </button>
    <img id="lightbox-img" src="" alt="Zoom Candidate">
</div>

<div class="hero">
    <svg class="crown-svg"><use xlink:href="#icon-crown"></use></svg>
    <p class="hero-label">Concours Officiel 2025</p>
    <h1>Miss <em>Beauté</em></h1>
    <p class="hero-sub" style="color: var(--muted); max-width: 500px; margin: 15px auto; font-size: 14px; line-height: 1.6;">L'élégance est la seule beauté qui ne se fane jamais. Soutenez votre favorite vers le trône.</p>
    <div class="gold-line"></div>
    <div class="vote-info glass-btn">
        <span><b style="color:var(--gold)">OR</b> Premier vote : 100 FCFA</span>
        <span style="opacity: 0.3">|</span>
        <span><b style="color:var(--rose)">ROSE</b> Suivants : 25 FCFA</span>
    </div>
</div>

<div class="controls">
    <div class="search-wrap">
        <input type="text" id="search" placeholder="Rechercher l'excellence..." oninput="filtrer()">
        <span class="icon"><svg class="icon-svg"><use xlink:href="#icon-search"></use></svg></span>
    </div>
</div>

<div class="grid-section">
    <p id="grid-count" style="text-align:center; font-size:11px; letter-spacing:2px; text-transform:uppercase; color:var(--gold); margin-bottom:30px; opacity:0.7;"></p>
    <div class="grid" id="grid">
        </div>
</div>

<div class="overlay" id="modal-login">
    <div class="modal">
        <h2 style="font-family:'Cormorant Garamond'; font-size:32px; text-align:center; color:var(--gold2); margin-bottom:10px;">Identification</h2>
        <div id="login-for" style="margin-bottom:20px; text-align:center; font-size:14px; color:var(--muted);"></div>
        <input type="tel" class="field" id="login-tel" placeholder="Numéro de téléphone">
        <input type="email" class="field" id="login-email" placeholder="Adresse E-mail (Optionnel)">
        <button class="btn-main" onclick="submitLogin()">Continuer l'expérience</button>
        <button onclick="closeModal('modal-login')" style="background:none; border:none; color:var(--muted); width:100%; margin-top:15px; cursor:pointer;">Annuler</button>
    </div>
</div>

<div class="overlay" id="modal-vote">
    <div class="modal">
        <div id="modal-vote-content"></div>
    </div>
</div>

<div class="toast-container" id="toasts" style="position:fixed; bottom:20px; right:20px; z-index:5000;"></div>

<script>
// CONFIG & STATE (Inchangé pour garder la connexion backend)
const API       = "https://backend-xxgf.onrender.com";
const WAVE_LINK = "https://pay.wave.com/m/M_ci_zuXWh0fj9YGV/c/ci/";

let allCandidates = [];
let currentVoter  = null;
let targetCand    = null;

// INIT
window.onload = async () => {
    await chargerCandidates();
    const stored = localStorage.getItem('miss_voter');
    if (stored) {
        try {
            const v = JSON.parse(stored);
            const r = await fetch(`${API}/miss/voter/${v.id}`);
            if (r.ok) {
                const data = await r.json();
                currentVoter = data.voter;
                localStorage.setItem('miss_voter', JSON.stringify(currentVoter));
            }
        } catch (e) {}
    }
};

async function chargerCandidates() {
    try {
        const r = await fetch(`${API}/miss/candidates`);
        const data = await r.json();
        allCandidates = data.candidates || [];
        renderGrid(allCandidates);
    } catch (e) {
        document.getElementById('grid').innerHTML = `<p style="text-align:center; grid-column:1/-1;">Erreur de connexion au serveur.</p>`;
    }
}

function renderGrid(list) {
    const sorted = [...list].sort((a, b) => b.votes - a.votes);
    document.getElementById('grid-count').textContent = `${sorted.length} CANDIDATES EN LICE`;

    document.getElementById('grid').innerHTML = sorted.map((c, i) => `
        <div class="card" style="animation: fadeUp 0.6s ease forwards ${i * 0.1}s; opacity:0;">
            <div class="card-img" onclick="openLightbox('${c.photo_url || ''}')">
                ${c.photo_url 
                    ? `<img src="${c.photo_url}" alt="${c.nom}">` 
                    : `<div style="height:100%; display:flex; align-items:center; justify-content:center; background:#1a1a1a;"><svg style="width:50px; fill:#333;"><use xlink:href="#icon-crown"></use></svg></div>`
                }
                <span class="card-numero">N° ${String(c.numero).padStart(2,'0')}</span>
            </div>
            <div class="card-body">
                <div class="card-name">${c.nom}</div>
                <div class="card-desc">${c.description || 'Candidate Officielle'}</div>
                <div class="card-footer">
                    <div style="font-size:14px; color:var(--rose); font-weight:bold; display:flex; align-items:center; gap:5px;">
                        <svg class="icon-svg"><use xlink:href="#icon-heart"></use></svg>
                        ${parseInt(c.votes || 0).toLocaleString()}
                    </div>
                    <button class="btn-vote" onclick="ouvrirVote(${c.id})">VOTER</button>
                </div>
            </div>
        </div>
    `).join('');
}

// FONCTION LIGHTBOX (ZOOM)
function openLightbox(url) {
    if(!url) return;
    const lb = document.getElementById('lightbox');
    const img = document.getElementById('lightbox-img');
    img.src = url;
    lb.classList.add('active');
    document.body.style.overflow = 'hidden';
}

function closeLightbox() {
    document.getElementById('lightbox').classList.remove('active');
    document.body.style.overflow = '';
}

// LOGIQUE VOTE (Similaire à l'original, mise à jour visuelle)
function ouvrirVote(candidateId) {
    targetCand = allCandidates.find(c => c.id === candidateId);
    if (!targetCand) return;

    if (!currentVoter) {
        document.getElementById('login-for').innerHTML = `Vote pour <b>${targetCand.nom}</b>`;
        openModal('modal-login');
    } else {
        ouvrirModalVote();
    }
}

// Les fonctions submitLogin, ouvrirModalVote, soumettreDemande, etc. 
// doivent être reprises de ton code original ici pour fonctionner avec ton API.
// Voici les versions adaptées au nouveau design :

async function submitLogin() {
    const tel = document.getElementById('login-tel').value;
    const email = document.getElementById('login-email').value;
    if(!tel && !email) return toast("Veuillez remplir un champ", false);

    try {
        const r = await fetch(`${API}/miss/voter/login`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ telephone: tel || null, email: email || null })
        });
        const data = await r.json();
        if (data.success) {
            currentVoter = data.voter;
            localStorage.setItem('miss_voter', JSON.stringify(currentVoter));
            closeModal('modal-login');
            ouvrirModalVote();
        }
    } catch(e) { toast("Erreur de connexion", false); }
}

function ouvrirModalVote() {
    const isFirst = !currentVoter.a_paye_premier_vote;
    const c = targetCand;
    let html = `
        <h2 style="font-family:'Cormorant Garamond'; font-size:28px; text-align:center; color:var(--gold2); margin-bottom:20px;">Soutenir ${c.nom}</h2>
    `;

    if(isFirst) {
        html += `
            <div style="background:rgba(201,168,76,0.1); padding:20px; border-radius:15px; text-align:center; border:1px solid var(--gold); margin-bottom:20px;">
                <div style="font-size:12px; text-transform:uppercase; letter-spacing:1px;">Premier Vote</div>
                <div style="font-size:32px; font-weight:bold; color:var(--gold2);">100 FCFA</div>
            </div>
            <a href="${WAVE_LINK}?amount=100" target="_blank" class="btn-main" style="display:block; text-decoration:none; text-align:center; margin-bottom:15px; background: #0098df; color:white;">Payer via WAVE</a>
            <input type="text" class="field" id="txn-id-premier" placeholder="Référence de transaction Wave">
            <button class="btn-main" onclick="soumettreDemande(1, 100)">Valider mon vote</button>
        `;
    } else {
        html += `
            <div style="background:rgba(255,255,255,0.05); padding:20px; border-radius:15px; margin-bottom:20px;">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                    <span>Nombre de votes</span>
                    <input type="number" id="qty-votes" value="1" min="1" oninput="updateCalc()" style="width:60px; background:black; border:1px solid var(--gold); color:white; padding:5px; border-radius:5px;">
                </div>
                <div style="display:flex; justify-content:space-between; font-weight:bold;">
                    <span>Total</span>
                    <span id="calc-total" style="color:var(--gold2);">25 FCFA</span>
                </div>
            </div>
            <a href="${WAVE_LINK}" id="wave-btn-multi" target="_blank" class="btn-main" style="display:block; text-decoration:none; text-align:center; margin-bottom:15px; background: #0098df; color:white;">Payer via WAVE</a>
            <input type="text" class="field" id="txn-id-multi" placeholder="Référence de transaction Wave">
            <button class="btn-main" onclick="soumettreDemandeMulti()">Confirmer les votes</button>
        `;
    }
    html += `<button onclick="closeModal('modal-vote')" style="background:none; border:none; color:var(--muted); width:100%; margin-top:15px; cursor:pointer;">Retour</button>`;
    
    document.getElementById('modal-vote-content').innerHTML = html;
    openModal('modal-vote');
    if(!isFirst) updateCalc();
}

function updateCalc() {
    const qty = Math.max(1, parseInt(document.getElementById('qty-votes').value) || 1);
    const total = qty * 25;
    document.getElementById('calc-total').textContent = total + ' FCFA';
    document.getElementById('wave-btn-multi').href = `${WAVE_LINK}?amount=${total}`;
}

async function soumettreDemande(nb, mont) {
    const tid = document.getElementById('txn-id-premier')?.value || document.getElementById('txn-id-multi')?.value;
    if(!tid) return toast("Référence manquante", false);
    
    try {
        const r = await fetch(`${API}/miss/voter/demande-vote`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                voter_id: currentVoter.id,
                candidate_numero: targetCand.numero,
                nombre_votes: nb,
                montant: mont,
                transaction_id: tid
            })
        });
        const data = await r.json();
        if(data.success) {
            document.getElementById('modal-vote-content').innerHTML = `
                <div style="text-align:center; padding:20px;">
                    <svg class="icon-svg" style="width:60px; height:60px; color:var(--gold); margin-bottom:20px;"><use xlink:href="#icon-crown"></use></svg>
                    <h3 style="color:var(--gold2); font-family:'Cormorant Garamond'; font-size:24px;">Demande Reçue</h3>
                    <p style="font-size:14px; color:var(--muted); margin:15px 0;">Votre vote est en cours de validation par nos services.</p>
                    <button class="btn-main" onclick="closeModal('modal-vote')">Fermer</button>
                </div>
            `;
            currentVoter.a_paye_premier_vote = true;
            localStorage.setItem('miss_voter', JSON.stringify(currentVoter));
        }
    } catch(e) { toast("Erreur réseau", false); }
}

function soumettreDemandeMulti() {
    const qty = parseInt(document.getElementById('qty-votes').value);
    soumettreDemande(qty, qty * 25);
}

function filtrer() {
    const q = document.getElementById('search').value.toLowerCase();
    renderGrid(allCandidates.filter(c => c.nom.toLowerCase().includes(q) || String(c.numero).includes(q)));
}

function openModal(id) { document.getElementById(id).classList.add('active'); }
function closeModal(id) { document.getElementById(id).classList.remove('active'); }

function toast(msg, ok = true) {
    const t = document.createElement('div');
    t.style.cssText = `background:${ok?'#1a4a1a':'#4a1a1a'}; color:white; padding:15px 25px; border-radius:10px; margin-top:10px; border:1px solid ${ok?'#2a6a2a':'#6a2a2a'};`;
    t.textContent = msg;
    document.getElementById('toasts').appendChild(t);
    setTimeout(() => t.remove(), 4000);
}

// Close lightbox on Escape key
document.addEventListener('keydown', e => { if(e.key === 'Escape') closeLightbox(); });
</script>

<style>
@keyframes fadeUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
}
</style>

</body>
</html>
